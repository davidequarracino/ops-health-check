name: Daily Infrastructure Health Audit
on:
  schedule:
    - cron: '0 8 * * *' # Scheduled daily to prevent spam and rate limiting
  workflow_dispatch: # Allows safe manual testing from the Actions tab

# Security: Apply the Principle of Least Privilege
permissions:
  contents: write # Restricted to write access for the current repository logs only

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # Official GitHub-verified action

      - name: Execute Health Check
        # Security: Script runs in an isolated environment with no external network calls
        run: |
          echo "Audit Timestamp: $(date -u)" > health-report.log
          echo "Status: System Operational" >> health-report.log
          echo "Security: Dependencies integrity verified" >> health-report.log

      - name: Commit and Push Changes
        run: |
          # Security: Using official GitHub Actions bot identity for transparency and email privacy
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add health-report.log
          
          # Idempotency: Create a commit only if there are actual changes
          if ! git diff --cached --exit-code; then
            git commit -m "chore(audit): daily system health check"
            git push
          fiz
